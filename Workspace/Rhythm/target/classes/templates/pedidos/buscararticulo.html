<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Buscar pedidos</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
	<div
		class="container h-100 d-flex justify-content-center align-items-center">
		<div class="container w-50">
			<h3 style="text-align: center;">Buscar artículo</h3>
			<form action="#" th:action="@{/postbuscararticulo}" th:object="${buscarArticuloForm}"
				method="post">
				<table class="table table-secondary table-striped">
					<tr>
						<td>Artículo a buscar</td>
					</tr>
					<tr>
						<td><input type="text" th:field="*{articulo}"></td>
					</tr>
					<tr>
						<td class="text-danger" th:if="${#fields.hasErrors('articulo')}"
							th:errors="*{articulo}">Artículo Error</td>
					</tr>
					<tr>
						<td colspan="3" style="text-align: center;">
							<button type="submit" class="btn btn-success btn btn-outline-light">Enviar</button> 
							<a href="/" class="btn btn-success btn btn-outline-light">Volver</a>
						</td>
					</tr>
				</table>
				<br> <br>
				
			</form>
		</div>
	</div>
</body>
</html>
