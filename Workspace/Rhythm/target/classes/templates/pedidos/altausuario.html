<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Alta usuarios</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

	<div
		class="container h-100 d-flex justify-content-center align-items-center">
		<div class="container w-50">
			<h3 style="text-align: center;">Alta usuarios</h3>
			<form action="#" th:action="@{/postusuario}"
				th:object="${usuarioForm}" method="post">
				<table class="table table-secondary table-striped">
					<tr>
						<td>Nombre:</td>
						<td><input type="text" th:field="*{name}"></td>
						<td class="text-danger" th:if="${#fields.hasErrors('name')}"
							th:errors="*{name}">Nombre Error</td>
					</tr>
					<tr>
						<td>Email:</td>
						<td><input type="email" th:field="*{email}"></td>
						<td class="text-danger" th:if="${#fields.hasErrors('email')}"
							th:errors="*{email}">Email Error</td>
					</tr>
					<tr>
						<td colspan="3" style="text-align: center;">
							<button type="submit" class="btn btn-success btn btn-outline-light">Enviar</button>
							<a href="/" class="btn btn-success btn btn-outline-light">Volver</a>
						</td>
					</tr>
				</table><br><br>
			</form>
		</div>
	</div>

</body>
</html>
