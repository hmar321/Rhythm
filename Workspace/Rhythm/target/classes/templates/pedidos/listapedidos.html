<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Lista pedidos</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

	<div class="container mt-3">
		<table class="table table-secondary table-striped">
			<thead>
				<tr>
					<th>Artículo</th>
					<th>Fecha pedido</th>
					<th>Fecha entrega</th>
					<th>Estado</th>
					<th>Destinatario</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="pedido:${listaPedidos}">
				
					<td th:text="${pedido.articulo}"></td>
					<td th:text="${pedido.fechaPedido}"></td>
					<td th:text="${pedido.fechaEntrega}"></td>
					<td th:text="${pedido.estado}"></td>
					<td th:text="${pedido.usuarioName}"></td>
				</tr>
			</tbody>
		</table>
		<br> <a href="/" class="btn btn-success btn btn-outline-light">Inicio</a>
	</div>

</body>
</html>
