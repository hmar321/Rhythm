<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Sign-in</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

	<div class="container d-flex align-items-center justify-content-center">
		<div class="card bg-light w-50  d-flex align-items-center justify-content-center" >
			<article class="card-body mx-auto" style="max-width: 400px;">
				<h4 class="card-title mt-3 text-center">Crear perfil</h4>
				<form action="#" th:action="@{/postaltausuario}"
					th:object="${usuarioAltaForm}" method="post">
					<div class="text-danger" th:if="${session.containsKey('error')}"
						th:text="${session.error}"></div>
					<div class="form-group input-group">
						<input name="" class="form-control" placeholder="Nick" type="text"
							th:field="*{nick}">
					</div>
					<br>
					<div class="form-group input-group">
						<input name="" class="form-control" placeholder="Nombre"
							type="text" th:field="*{nombre}"> <input name=""
							class="form-control" placeholder="Apellido" type="text"
							th:field="*{apellido}">
					</div>
					<br>
					<div class="form-group input-group">
						<input name="" class="form-control" placeholder="Email"
							type="email" th:field="*{email}">
					</div>
					<br>
					<div class="form-group input-group">

						<input class="form-control" placeholder="Contraseña"
							type="password" th:field="*{password}">
					</div>
					<br>
					<div class="form-group input-group">

						<input class="form-control" placeholder="Repite tu contraseña"
							type="password" th:field="*{password2}">
					</div>
					<br>
					<div class="form-group">

						<button type="submit" class="btn btn-primary btn-block">
							Create Account</button>
					</div>
					<br>
					<p class="text-center">
						¿Estás registrado? <a href="/">Log In</a>
					</p>
				</form>
			</article>
		</div>

	</div>

</body>
</html>
