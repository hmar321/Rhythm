<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Añadir lista</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
	<div class="container d-flex align-items-center justify-content-center">
		<div
			class="card bg-light w-50 d-flex align-items-center justify-content-center">
			<article class="card-body mx-auto " style="max-width: 400px;">
				<h4 class="card-title mt-3 text-center">Añadir lista</h4>
				<form action="#" th:action="@{/postcrearlista}"
					th:object="${listaForm}" method="post">
					<div class="text-danger" th:text=${error}></div>
					<br>

					<div class="form-group input-group">
						<input class="form-control" placeholder="Titulo lista" type="text"
							th:field="*{titulo}">
					</div>
					<div class="text-danger" th:if="${#fields.hasErrors('titulo')}"
						th:errors="*{titulo}">Título Error</div>
					<div>
						<input type="hidden" th:attr="name='usuario'" th:value="${usuario.id}"/>
					</div>
					<br>
					<button type="submit" class="btn btn-dark btn-block">
						Añadir</button>
				</form>
			</article>
		</div>

	</div>

</body>

</html>
