<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Actualizar música</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
	<div class="container d-flex align-items-center justify-content-center">
		<div
			class="card bg-light w-50 d-flex align-items-center justify-content-center">
			<article class="card-body mx-auto " style="max-width: 400px;">
				<h4 class="card-title mt-3 text-center">Actualizar música</h4>
				<form action="#" th:action="@{/post_musica_updating}"
					th:object="${musicaForm}" method="post">
					<div class="text-danger" th:text=${error}></div>
					<br>
					<div class="form-group input-group">
						<input class="form-control" placeholder="Título"  type="text"
							th:field="*{titulo}">

					</div>
					<div class="text-danger" th:if="${#fields.hasErrors('titulo')}"
						th:errors="*{titulo}">Título Error</div>
					<br>
					<div class="form-group input-group">

						<select class="form-select" th:field="*{artista}">
							<option value="" selected="selected">Seleccionar artista</option>
							<option th:each="artista:${listaArtistas}"
								th:text="${artista.nick}" th:value="${artista.id}"></option>
						</select>

					</div>

					<div class="text-danger" th:if="${#fields.hasErrors('artista')}"
						th:errors="*{artista}">Artista Error</div>
					<br>
					<label  for="generos">Selecciona uno o varios géneros:</label>
					<div class="form-group input-group">
						<select multiple size="7" id="generos" class="form-select" th:field="*{genero}">
							<option th:each="genero:${listaGeneros}"
								th:text="${genero.nombre}" th:value="${genero.id}"></option>
						</select>
					</div>
					<div class="text-danger" th:if="${#fields.hasErrors('genero')}"
						th:errors="*{genero}">Género Error</div>
					<br>
					<div class="form-group input-group">
						<input class="form-control" type="date" th:field="*{estreno}">
					</div>
					<div class="text-danger" th:if="${#fields.hasErrors('estreno')}"
						th:errors="*{estreno}">Fecha Error</div>
					<br>
					<div class="form-group input-group">
						<input class="form-control" placeholder="Embed link" type="text"
							th:field="*{embed}">

					</div>
					<div class="text-danger" th:if="${#fields.hasErrors('embed')}"
						th:errors="*{embed}">Link Error</div>
					<div class="form-group">
						<br>
						<button type="submit" class="btn btn-dark btn-block">
							Actualizar</button>
					</div>
				</form>
			</article>
		</div>

	</div>

</body>

</html>
