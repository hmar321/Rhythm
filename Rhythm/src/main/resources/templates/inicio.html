<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Inicio</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body>

	<div class="container-fluid">
		<div class="row flex-nowrap">
			<div class="col-auto col-md-3 col-xl-2 px-sm-2 px-0 bg-dark">
				<div
					class="d-flex flex-column align-items-center align-items-sm-start px-3 pt-2 text-white min-vh-100">
					<h3 class="text-light" th:text="${session.nick}"></h3>
					<img src="perfil.png" class="rounded-circle" alt="usuario1"
						width="100" height="100"> <br>
					<ul class="nav nav-pills flex-column">
						<li class="nav-item"><a class="nav-link link-light"
							href="/listas" target="nav_seg">Listas de
								reproducción</a></li>
						<li class="nav-item"><a class="nav-link link-light"
							href="/artistas" target="nav_seg">Artistas</a></li>
						<li class="nav-item"><a class="nav-link link-light"
							href="/musicas" target="nav_seg">Músicas</a></li>
					</ul>
					<a href="/cerrar_sesion" class="btn btn-primary btn btn-outline-light">Cerrar sesion</a>
					<hr>
				</div>
			</div>

			<iframe src="/listas" class="col-auto col-md-9 "
				allowfullscreen name="nav_seg" >
			</iframe>

		</div>
	</div>

</body>
</html>
