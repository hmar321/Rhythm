<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Importar</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
	<div class="container d-flex align-items-center justify-content-center">
		<div
			class="card bg-light w-75 d-flex align-items-center justify-content-center">
			<article class="card-body mx-auto " style="max-width: 700px;min-height: 400px;">
				<h1 class="card-title mt-3 text-center">Importar</h1>
				<form th:action="@{/artistas_import}" method="POST"
					enctype="multipart/form-data">
					<h5 class="card-title mt-3 text-center">Artistas</h5>
					<div class="input-group">
						<input type="file" class="form-control" id="myfile" name="myfile" accept=".json, .xml">
						<input type="submit" class="btn btn-outline-secondary"
							value="Cargar archivo">
					</div>
				</form>
				<form th:action="@{/musicas_import}" method="POST"
					enctype="multipart/form-data">
					<h5 class="card-title mt-3 text-center">Músicas</h5>
					<div class="input-group">
						<input type="file" class="form-control" id="myfile" name="myfile" accept=".json, .xml">
						<input type="submit" class="btn btn-outline-secondary"
							value="Cargar archivo">
					</div>
				</form>
				<br>
				<h3 class="text-success" th:text=${mensaje}></h3>
				<h3 class="text-danger" th:text=${error}></h3>
			</article>
		</div>

	</div>

</body>

</html>
