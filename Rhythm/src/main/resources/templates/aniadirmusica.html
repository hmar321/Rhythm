<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Añadir música</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
	<div class="container d-flex align-items-center justify-content-center">
		<div
			class="card bg-light w-50 d-flex align-items-center justify-content-center">
			<article class="card-body mx-auto " style="max-width: 400px;">
				<h4 class="card-title mt-3 text-center">Añadir música</h4>
				<form action="#" th:action="@{/postlistaaniadirmusica}"
					th:object="${listaMusicaForm}" method="post">
					<div class="text-danger" th:text=${error}></div>
					<br>
					<input type="hidden" th:attr="name='lista'" th:value="${lista.id}"/>
					<div class="form-group input-group">

						<select class="form-select" th:field="*{musica}">
							<option value="" selected="selected">Seleccionar música</option>
							<option th:each="musica:${listaMusicas}"
								th:text="${musica.titulo}" th:value="${musica.id}"></option>
						</select>

					</div>

					<div class="text-danger" th:if="${#fields.hasErrors('musica')}"
						th:errors="*{musica}">Música Error</div>
					<br>
					<div class="form-group">
						<button type="submit" class="btn btn-success btn-block">
							Añadir</button>
						<a href="/volverlistareproduccion" class="btn btn-success btn btn-outline-light">Volver</a>
					</div>
				</form>
			</article>
		</div>

	</div>

</body>

</html>
