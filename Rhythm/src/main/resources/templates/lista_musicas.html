<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Lista musicas</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

	<div class="container mt-3">
		<table class="table table-secondary table-striped">
			<thead>
				<tr>
					<th>Titulo</th>
					<th>Estreno</th>
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="musica:${listaMusicas}">
					<td th:text="${musica.titulo}"></td>
					<td th:text="${musica.estreno}"></td>
					<td><a class="btn btn-success" th:href="@{{embed}(embed=${musica.embed})}">Escuchar</a></td>
				</tr>
			</tbody>
		</table>
		<br> <a href="/lista_add_musica" class="btn btn-success btn btn-outline-light">Añadir música</a>
		<a href="/listas" class="btn btn-success btn-outline-light">Volver</a>
	</div>

</body>
</html>
