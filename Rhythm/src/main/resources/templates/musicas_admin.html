<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Lista musicas</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

	<div class="container mt-3">
		<table class="table table-secondary table-striped">
			<thead>
				<tr>
					<th>Id</th>
					<th>Titulo</th>
					<th>Estreno</th>
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="musica:${listaMusicas}">
					<td th:text="${musica.id}"></td>
					<td th:text="${musica.titulo}"></td>
					<td th:text="${musica.estreno}"></td>
					<td><form action="#" th:action="@{/post_musica_update}"
					th:object="${musicaHiddenForm}" method="post">
					<input type="hidden" th:attr="name='musica'" th:value="${musica.id}"/>
					<button type="submit" class="btn btn-success">
							Editar</button></form></td>
				</tr>
			</tbody>
		</table>
	</div>

</body>
</html>
