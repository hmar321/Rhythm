<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Listas de reproducción</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

	<div class="container mt-3">
		<table class="table table-secondary table-striped">
			<thead>
				<tr>
					<th>Lista reproducción</th>
					<th>Músicas</th>
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="lista:${listaListas}">
					<td th:text="${lista.titulo}"></td>
					<td th:text="${lista.numMusicas}"></td>
					<td><form action="#" th:action="@{/post_lista_musicas}"
					th:object="${listaMusicasForm}" method="post">
					<input type="hidden" th:attr="name='lista'" th:value="${lista.id}"/>
					<button type="submit" class="btn btn-success btn-block">
							Ver lista</button></form></td>
				</tr>
			</tbody>
			
		</table>
		<br> <a href="/lista_crear" class="btn btn-primary btn btn-outline-light">Añadir lista</a>
		
	</div>

</body>
</html>
